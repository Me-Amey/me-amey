<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Contribution Snake</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #161b22 0%, #0d1117 100%);
      color: #c9d1d9;
      font-family: Inter, system-ui, sans-serif;
    }
    .board {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      border-radius: 24px;
      overflow: hidden;
      background: #0f1318;
      padding: 20px;
      width: max-content;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 1.5rem;
      text-align: center;
      color: #58a6ff;
    }
    p {
      margin: 8px 0 18px;
      text-align: center;
      color: #8b949e;
    }
    canvas {
      display: block;
      border-radius: 16px;
      background: linear-gradient(135deg, #0d1117 0%, #111827 100%);
      margin: 0 auto;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    .footer {
      margin-top: 16px;
      display: grid;
      gap: 8px;
      text-align: center;
      color: #8b949e;
      font-size: 0.94rem;
    }
    .footer span {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .hint {
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="board">
    <h1>GitHub Contribution Snake</h1>
    <p>Eat the contribution blocks and grow as much as possible. Use your keyboard arrows.</p>
    <canvas id="game" width="560" height="160"></canvas>
    <div class="footer">
      <span>Score: <strong id="score">0</strong></span>
      <span class="hint">Press <strong>R</strong> to restart anytime</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const cols = 28;
    const rows = 8;
    const cellSize = 20;
    const gridWidth = cols;
    const gridHeight = rows;

    const colors = {
      background: '#0d1117',
      border: '#21262d',
      snake: '#79c0ff',
      head: '#58a6ff',
      food: ['#2ea043', '#2c974b', '#238636', '#216e39'],
      empty: '#161b22',
    };

    const contributionLevels = [
      '#0f1318',
      '#0b1d12',
      '#116329',
      '#2c974b',
      '#2ea043'
    ];

    let snake, direction, food, score;

    function buildGrid() {
      const grid = [];
      for (let y = 0; y < rows; y++) {
        const row = [];
        for (let x = 0; x < cols; x++) {
          const index = Math.floor((x + y) / 4) % contributionLevels.length;
          row.push(contributionLevels[index]);
        }
        grid.push(row);
      }
      return grid;
    }

    const contributionGrid = buildGrid();

    function resetGame() {
      snake = [
        { x: 4, y: 3 },
        { x: 3, y: 3 },
        { x: 2, y: 3 },
      ];
      direction = { x: 1, y: 0 };
      score = 0;
      document.getElementById('score').textContent = score;
      placeFood();
      draw();
    }

    function placeFood() {
      const available = [];
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (!snake.some(segment => segment.x === x && segment.y === y)) {
            available.push({ x, y });
          }
        }
      }
      food = available[Math.floor(Math.random() * available.length)];
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2);
    }

    function drawGrid() {
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          ctx.fillStyle = contributionGrid[y][x];
          ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          ctx.strokeStyle = colors.border;
          ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }
      }
    }

    function draw() {
      ctx.fillStyle = colors.background;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      snake.forEach((segment, index) => {
        drawCell(segment.x, segment.y, index === 0 ? colors.head : colors.snake);
      });

      if (food) {
        const foodColor = colors.food[(food.x + food.y) % colors.food.length];
        drawCell(food.x, food.y, foodColor);
      }
    }

    function step() {
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
        return resetGame();
      }

      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        return resetGame();
      }

      snake.unshift(head);

      if (food && head.x === food.x && head.y === food.y) {
        score += 1;
        document.getElementById('score').textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    document.addEventListener('keydown', event => {
      const key = event.key;
      if (key === 'ArrowUp' && direction.y !== 1) direction = { x: 0, y: -1 };
      if (key === 'ArrowDown' && direction.y !== -1) direction = { x: 0, y: 1 };
      if (key === 'ArrowLeft' && direction.x !== 1) direction = { x: -1, y: 0 };
      if (key === 'ArrowRight' && direction.x !== -1) direction = { x: 1, y: 0 };
      if (key.toLowerCase() === 'r') resetGame();
    });

    resetGame();
    setInterval(step, 180);
  </script>
</body>
</html>
